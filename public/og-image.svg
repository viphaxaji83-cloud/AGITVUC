<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Контрактная служба для студентов">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eff6ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif" fill="#0f172a">
    <text x="80" y="160" font-size="28" fill="#1d4ed8" font-weight="600" letter-spacing="3">ИНФОРМАЦИОННЫЙ РАЗДЕЛ · УНИВЕРСИТЕТ</text>
    <text x="80" y="270" font-size="76" font-weight="700">Контрактная служба</text>
    <text x="80" y="350" font-size="76" font-weight="700">для студентов</text>
    <text x="80" y="430" font-size="32" fill="#475569" font-weight="400">Условия, направления и порядок официальной</text>
    <text x="80" y="475" font-size="32" fill="#475569" font-weight="400">консультации — спокойно и без давления.</text>
  </g>
  <g transform="translate(80,540)">
    <rect x="0" y="0" width="220" height="6" rx="3" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="0" y="0" width="220" height="6" rx="3" fill="#ffffff"/>
    <rect x="0" y="6" width="220" height="6" rx="3" fill="#0039a6"/>
    <rect x="0" y="12" width="220" height="6" rx="3" fill="#d62718"/>
  </g>
  <g transform="translate(900,200)">
    <rect width="240" height="240" rx="32" fill="#ffffff" stroke="#dbeafe" stroke-width="2"/>
    <text x="120" y="138" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="120" font-weight="700" fill="#1d4ed8">КСС</text>
  </g>
</svg>
